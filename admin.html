<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - AMNEXA Technologies</title>
  <meta name="robots" content="noindex, nofollow" />
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Styles -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #070b14;
      color: #ffffff;
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, rgba(59,130,246,0.1) 100%);
    }
    
    .login-card {
      background: rgba(14, 22, 40, 0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }
    
    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .login-card p {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 32px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      background: rgba(7,11,20,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s;
    }
    
    .form-group input:focus {
      border-color: #8B5CF6;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
    }
    
    .btn {
      width: 100%;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      background: linear-gradient(135deg, #8B5CF6, #3B82F6);
      color: #fff;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,92,246,0.4);
    }
    
    .error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    
    /* Admin Dashboard */
    .admin-dashboard {
      display: none;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .admin-header h1 {
      font-size: 28px;
      font-weight: 700;
    }
    
    .logout-btn {
      padding: 10px 20px;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .logout-btn:hover {
      background: rgba(255,80,80,0.2);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: rgba(14, 22, 40, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px;
    }
    
    .stat-card h3 {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .stat-card .number {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #8B5CF6, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .submissions-list {
      background: rgba(14, 22, 40, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .submissions-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 100px;
      gap: 16px;
      padding: 16px 24px;
      background: rgba(139,92,246,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
    }
    
    .submission-item {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 100px;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
      align-items: center;
    }
    
    .submission-item:hover {
      background: rgba(255,255,255,0.02);
    }
    
    .submission-item:last-child {
      border-bottom: none;
    }
    
    .submission-name {
      font-weight: 600;
      color: #fff;
    }
    
    .submission-email {
      color: #94a3b8;
      font-size: 14px;
    }
    
    .submission-service {
      color: #3B82F6;
      font-size: 13px;
    }
    
    .submission-date {
      color: #64748b;
      font-size: 13px;
    }
    
    .view-btn {
      padding: 6px 12px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px;
      color: #3B82F6;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .view-btn:hover {
      background: rgba(59,130,246,0.2);
    }
    
    .delete-btn {
      padding: 6px 12px;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 6px;
      color: #ff6b6b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .delete-btn:hover {
      background: rgba(255,80,80,0.2);
    }
    
    .empty-state {
      padding: 48px;
      text-align: center;
      color: #94a3b8;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: rgba(14, 22, 40, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .modal-header h2 {
      font-size: 20px;
      font-weight: 700;
    }
    
    .close-modal {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .close-modal:hover {
      color: #fff;
    }
    
    .modal-field {
      margin-bottom: 16px;
    }
    
    .modal-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .modal-field p {
      color: #fff;
      font-size: 15px;
      line-height: 1.6;
    }
    
    .modal-field.message p {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 8px;
      border-left: 3px solid #3B82F6;
    }
    
    @media (max-width: 768px) {
      .submissions-header,
      .submission-item {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      
      .submissions-header > :nth-child(3),
      .submissions-header > :nth-child(4),
      .submission-item > :nth-child(3),
      .submission-item > :nth-child(4) {
        display: none;
      }
    }
  </style>
</head>
<body>
  
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>Admin Login</h1>
      <p>Enter password to access submissions</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter password" />
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="error" id="loginError">Incorrect password</div>
      </form>
    </div>
  </div>
  
  <!-- Admin Dashboard -->
  <div class="admin-dashboard" id="adminDashboard">
    <div class="container">
      <div class="admin-header">
        <h1>Form Submissions</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Submissions</h3>
          <div class="number" id="totalSubmissions">0</div>
        </div>
        <div class="stat-card">
          <h3>This Week</h3>
          <div class="number" id="weekSubmissions">0</div>
        </div>
        <div class="stat-card">
          <h3>This Month</h3>
          <div class="number" id="monthSubmissions">0</div>
        </div>
      </div>
      
      <div class="submissions-list">
        <div class="submissions-header">
          <div>Name</div>
          <div>Email</div>
          <div>Service</div>
          <div>Date</div>
          <div>Actions</div>
        </div>
        <div id="submissionsContainer">
          <div class="empty-state">No submissions yet</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- View Modal -->
  <div class="modal" id="viewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Submission Details</h2>
        <button class="close-modal" id="closeModal">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  
  <script>
    // Configuration - Change this password
    const ADMIN_PASSWORD = 'amnexa123';
    
    // Check if already logged in
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      showDashboard();
    }
    
    // Login form
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      
      if (password === ADMIN_PASSWORD) {
        localStorage.setItem('adminLoggedIn', 'true');
        showDashboard();
      } else {
        loginError.style.display = 'block';
        document.getElementById('password').value = '';
      }
    });
    
    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('adminLoggedIn');
      location.reload();
    });
    
    // Show dashboard
    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminDashboard').style.display = 'block';
      loadSubmissions();
    }
    
    // Load submissions from localStorage
    function loadSubmissions() {
      const submissions = JSON.parse(localStorage.getItem('formSubmissions') || '[]');
      const container = document.getElementById('submissionsContainer');
      
      // Update stats
      document.getElementById('totalSubmissions').textContent = submissions.length;
      
      const now = new Date();
      const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
      const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
      
      document.getElementById('weekSubmissions').textContent = submissions.filter(s => new Date(s.date) >= weekAgo).length;
      document.getElementById('monthSubmissions').textContent = submissions.filter(s => new Date(s.date) >= monthAgo).length;
      
      if (submissions.length === 0) {
        container.innerHTML = '<div class="empty-state">No submissions yet</div>';
        return;
      }
      
      // Sort by date (newest first)
      submissions.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      container.innerHTML = submissions.map((sub, index) => `
        <div class="submission-item">
          <div class="submission-name">${escapeHtml(sub.name)}</div>
          <div class="submission-email">${escapeHtml(sub.email)}</div>
          <div class="submission-service">${escapeHtml(sub.service || 'N/A')}</div>
          <div class="submission-date">${formatDate(sub.date)}</div>
          <div>
            <button class="view-btn" onclick="viewSubmission(${index})">View</button>
            <button class="delete-btn" onclick="deleteSubmission(${index})">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    // View submission
    function viewSubmission(index) {
      const submissions = JSON.parse(localStorage.getItem('formSubmissions') || '[]');
      const sub = submissions[index];
      
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="modal-field">
          <label>Name</label>
          <p>${escapeHtml(sub.name)}</p>
        </div>
        <div class="modal-field">
          <label>Email</label>
          <p>${escapeHtml(sub.email)}</p>
        </div>
        <div class="modal-field">
          <label>Phone</label>
          <p>${escapeHtml(sub.phone || 'N/A')}</p>
        </div>
        <div class="modal-field">
          <label>Company</label>
          <p>${escapeHtml(sub.company || 'N/A')}</p>
        </div>
        <div class="modal-field">
          <label>Service</label>
          <p>${escapeHtml(sub.service || 'N/A')}</p>
        </div>
        <div class="modal-field">
          <label>Budget</label>
          <p>${escapeHtml(sub.budget || 'N/A')}</p>
        </div>
        <div class="modal-field">
          <label>Message</label>
          <p>${escapeHtml(sub.message)}</p>
        </div>
        <div class="modal-field">
          <label>Submitted</label>
          <p>${formatDate(sub.date)}</p>
        </div>
      `;
      
      document.getElementById('viewModal').classList.add('active');
    }
    
    // Delete submission
    function deleteSubmission(index) {
      if (confirm('Are you sure you want to delete this submission?')) {
        const submissions = JSON.parse(localStorage.getItem('formSubmissions') || '[]');
        submissions.splice(index, 1);
        localStorage.setItem('formSubmissions', JSON.stringify(submissions));
        loadSubmissions();
      }
    }
    
    // Close modal
    document.getElementById('closeModal').addEventListener('click', function() {
      document.getElementById('viewModal').classList.remove('active');
    });
    
    document.getElementById('viewModal').addEventListener('click', function(e) {
      if (e.target === this) {
        this.classList.remove('active');
      }
    });
    
    // Helper functions
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  </script>
</body>
</html>
